<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AIRIS SUITE | Conversor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Manrope', sans-serif; }
        body { background: #FAFAFA; color: #1a1a1a; min-height: 100vh; }
        
        .btn-primary {
            background: #0A2640;
            color: #FFFFFF;
            border-radius: 1rem;
            transition: all 0.2s ease;
            font-weight: 600;
            letter-spacing: 0.025em;
        }
        .btn-primary:hover { background: #0d3a6b; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { background: #EAEAEA; color: #627E84; cursor: not-allowed; transform: none; }
        
        .surface {
            background: #FFFFFF;
            border: 1px solid #EAEAEA;
            border-radius: 1rem;
        }
        
        .toggle-bg { transition: background-color 0.2s ease; }
        .toggle-dot { transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .toggle-active .toggle-bg { background-color: #65E4A3; border-color: #65E4A3; }
        .toggle-active .toggle-dot { transform: translateX(1rem); background-color: #0A2640; }
        
        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .file-item {
            transition: all 0.2s ease;
        }
        .file-item:hover {
            background: #F8F8F8;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #0A2640;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="bg-[#0A2640] w-full">
        <div class="max-w-3xl mx-auto px-6 py-12 text-center">
            <h1 class="text-white text-5xl font-bold" style="letter-spacing: -0.02em;">AIRIS</h1>
            <p class="text-white mt-3" style="color: #EAEAEA;">Conversión inteligente de documentos</p>
        </div>
    </div>

    <!-- Main Container -->
    <div class="max-w-3xl mx-auto px-6 py-12 space-y-8">
        
        <!-- Mode Selector -->
        <div class="flex gap-1 bg-white rounded-full p-1 border border-[#EAEAEA] w-fit mx-auto fade-in" style="animation-delay: 80ms;">
            <button id="modePdf" class="mode-btn px-6 py-2.5 rounded-full text-sm font-semibold transition-all bg-[#0A2640] text-white shadow-sm">
                <svg class="inline w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                PDF a Imagen
            </button>
            <button id="modeImg" class="mode-btn px-6 py-2.5 rounded-full text-sm font-semibold transition-all text-[#627E84] hover:text-[#0A2640]">
                <svg class="inline w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
                Solo Word
            </button>
        </div>

        <!-- Upload Zone -->
        <div id="dropZone" class="surface p-12 text-center cursor-pointer hover:border-[#0A2640]/30 transition-all fade-in" style="animation-delay: 160ms;">
            <input type="file" id="fileInput" multiple class="hidden">
            <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-[#0A2640]/5 flex items-center justify-center">
                <svg class="w-7 h-7 text-[#0A2640]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                </svg>
            </div>
            <div id="dropContent">
                <p class="text-[#0A2640] font-semibold text-lg mb-2">Arrastra archivos aquí</p>
                <p class="text-[#627E84] text-sm">o haz clic para seleccionar • PDF</p>
            </div>
            <div id="fileList" class="hidden mt-6 text-left space-y-2"></div>
        </div>

        <!-- Settings Panel (PDF Mode) -->
        <div id="pdfSettings" class="surface p-6 fade-in" style="animation-delay: 240ms;">
            <div class="flex items-center gap-2 mb-6">
                <svg class="w-[18px] h-[18px] text-[#0A2640]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <h3 class="font-semibold text-[#0A2640]">Configuración</h3>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="text-xs font-semibold text-[#627E84] uppercase tracking-wider mb-3 block">Calidad</label>
                    <select id="quality" class="w-full p-3 bg-[#F8F8F8] border border-[#EAEAEA] rounded-xl text-sm text-[#0A2640] font-medium">
                        <option value="Estándar">Estándar (150 DPI)</option>
                        <option value="HD" selected>HD (300 DPI)</option>
                        <option value="Ultra">Ultra (600 DPI)</option>
                    </select>
                </div>
                
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium text-[#0A2640]">Auto-recorte</span>
                    <button type="button" id="toggleAutoCrop" class="relative w-12 h-7 rounded-full border toggle-active" onclick="toggleSwitch('autoCrop')">
                        <div class="toggle-bg absolute inset-0 bg-[#EAEAEA] rounded-full border border-[#EAEAEA]"></div>
                        <div class="toggle-dot absolute left-0.5 top-0.5 w-6 h-6 bg-white rounded-full shadow-sm border border-[#EAEAEA]" style="transform: translateX(1rem); background-color: #0A2640;"></div>
                    </button>
                    <input type="hidden" id="autoCrop" value="true">
                </div>
                
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium text-[#0A2640]">Generar Word</span>
                    <button type="button" id="toggleGenWord" class="relative w-12 h-7 rounded-full border toggle-active" onclick="toggleSwitch('genWord')">
                        <div class="toggle-bg absolute inset-0 bg-[#EAEAEA] rounded-full border border-[#EAEAEA]"></div>
                        <div class="toggle-dot absolute left-0.5 top-0.5 w-6 h-6 bg-white rounded-full shadow-sm border border-[#EAEAEA]" style="transform: translateX(1rem); background-color: #0A2640;"></div>
                    </button>
                    <input type="hidden" id="genWord" value="true">
                </div>
            </div>
        </div>

        <!-- Progress -->
        <div id="progressArea" class="hidden surface p-6 fade-in">
            <div class="flex items-center gap-3 mb-4">
                <svg class="w-[18px] h-[18px] text-[#0A2640] animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                <span class="text-sm font-medium text-[#0A2640]" id="statusText">Procesando...</span>
            </div>
            <div class="h-2 bg-[#F8F8F8] rounded-full overflow-hidden">
                <div id="progressBar" class="h-full bg-[#65E4A3] rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <!-- Result -->
        <div id="resultArea" class="hidden surface p-6 bg-[#65E4A3]/10 border-[#65E4A3]/30 fade-in">
            <div class="flex items-center gap-3 mb-4">
                <svg class="w-5 h-5 text-[#0A2640]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="font-semibold text-[#0A2640]">Proceso completado</span>
            </div>
            <a id="downloadLink" href="#" class="inline-flex items-center gap-2 bg-[#0A2640] text-white px-6 py-3 rounded-xl font-semibold text-sm hover:bg-[#0d3a6b] transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                Descargar Word
            </a>
        </div>

        <!-- Action Button -->
        <div class="flex justify-center pt-4 fade-in" style="animation-delay: 320ms;">
            <button id="processBtn" class="btn-primary px-10 py-4 text-sm font-bold tracking-wide">
                <span class="flex items-center gap-2" id="btnText">
                    INICIAR CONVERSIÓN
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"></path>
                    </svg>
                </span>
            </button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="border-t border-[#EAEAEA] mt-16">
        <div class="max-w-3xl mx-auto px-6 py-8 text-center">
            <p class="text-xs text-[#627E84] font-medium">Desarrollado por Jorge Meneses • AIRIS SUITE v1.1</p>
        </div>
    </footer>

    <script>
        let mode = 'pdf';
        let files = [];
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const processBtn = document.getElementById('processBtn');
        const resultArea = document.getElementById('resultArea');
        const downloadLink = document.getElementById('downloadLink');
        const progressArea = document.getElementById('progressArea');
        const statusText = document.getElementById('statusText');
        const progressBar = document.getElementById('progressBar');
        const pdfSettings = document.getElementById('pdfSettings');
        const dropContent = document.getElementById('dropContent');
        const fileList = document.getElementById('fileList');

        function toggleSwitch(id) {
            const toggle = document.getElementById('toggle' + id.charAt(0).toUpperCase() + id.slice(1));
            const hiddenInput = document.getElementById(id);
            toggle.classList.toggle('toggle-active');
            hiddenInput.value = toggle.classList.contains('toggle-active') ? 'true' : 'false';
        }

        document.getElementById('modePdf').addEventListener('click', () => {
            mode = 'pdf';
            pdfSettings.classList.remove('hidden');
            updateModeButtons('pdf');
            fileInput.accept = '.pdf';
            dropContent.querySelector('p:last-child').textContent = 'o haz clic para seleccionar • PDF';
            files = [];
            updateFileDisplay();
        });

        document.getElementById('modeImg').addEventListener('click', () => {
            mode = 'img';
            pdfSettings.classList.add('hidden');
            updateModeButtons('img');
            fileInput.accept = '.jpg,.jpeg,.png';
            dropContent.querySelector('p:last-child').textContent = 'o haz clic para seleccionar • JPG, PNG';
            files = [];
            updateFileDisplay();
        });

        function updateModeButtons(activeMode) {
            const pdfBtn = document.getElementById('modePdf');
            const imgBtn = document.getElementById('modeImg');
            
            if (activeMode === 'pdf') {
                pdfBtn.classList.add('bg-[#0A2640]', 'text-white', 'shadow-sm');
                pdfBtn.classList.remove('text-[#627E84]', 'hover:text-[#0A2640]');
                imgBtn.classList.remove('bg-[#0A2640]', 'text-white', 'shadow-sm');
                imgBtn.classList.add('text-[#627E84]', 'hover:text-[#0A2640]');
            } else {
                imgBtn.classList.add('bg-[#0A2640]', 'text-white', 'shadow-sm');
                imgBtn.classList.remove('text-[#627E84]', 'hover:text-[#0A2640]');
                pdfBtn.classList.remove('bg-[#0A2640]', 'text-white', 'shadow-sm');
                pdfBtn.classList.add('text-[#627E84]', 'hover:text-[#0A2640]');
            }
        }

        dropZone.addEventListener('click', (e) => {
            if (e.target.closest('.file-item-remove')) return;
            fileInput.click();
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-[#0A2640]/30');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-[#0A2640]/30');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-[#0A2640]/30');
            const newFiles = Array.from(e.dataTransfer.files).filter(f => 
                mode === 'pdf' ? f.type === 'application/pdf' : f.type.startsWith('image/')
            );
            files = [...files, ...newFiles];
            updateFileDisplay();
        });

        fileInput.addEventListener('change', () => {
            files = [...files, ...Array.from(fileInput.files)];
            updateFileDisplay();
            fileInput.value = '';
        });

        function updateFileDisplay() {
            if (files.length > 0) {
                dropContent.classList.add('hidden');
                fileList.classList.remove('hidden');
                fileList.innerHTML = files.map((f, idx) => `
                    <div class="file-item flex items-center justify-between bg-[#F8F8F8] rounded-xl px-4 py-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-[#65E4A3]/10 flex items-center justify-center">
                                <svg class="w-[18px] h-[18px] text-[#0A2640]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                            </div>
                            <div>
                                <p class="text-sm font-medium">${f.name}</p>
                                <p class="text-xs text-[#627E84]">${(f.size / 1024 / 1024).toFixed(2)} MB</p>
                            </div>
                        </div>
                        <button class="file-item-remove p-1 hover:bg-red-50 rounded-lg transition-colors" onclick="removeFile(${idx})">
                            <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                `).join('');
            } else {
                dropContent.classList.remove('hidden');
                fileList.classList.add('hidden');
            }
        }

        window.removeFile = (index) => {
            files.splice(index, 1);
            updateFileDisplay();
        };

        processBtn.addEventListener('click', async () => {
            if (!files.length) return alert('Selecciona archivos');
            
            processBtn.disabled = true;
            progressArea.classList.remove('hidden');
            resultArea.classList.add('hidden');
            statusText.textContent = 'Subiendo archivos...';
            progressBar.style.width = '10%';

            try {
                const formData = new FormData();
                files.forEach(f => formData.append('files', f));

                statusText.textContent = 'Subiendo...';
                const uploadRes = await fetch('/upload', { method: 'POST', body: formData });
                const { task_id } = await uploadRes.json();

                statusText.textContent = 'Procesando...';
                progressBar.style.width = '30%';

                const procRes = await fetch('/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        task_id,
                        mode,
                        quality: document.getElementById('quality').value,
                        auto_crop: document.getElementById('autoCrop').value === 'true',
                        gen_word: document.getElementById('genWord').value === 'true'
                    })
                });

                progressBar.style.width = '100%';
                statusText.textContent = '¡Completado!';

                const data = await procRes.json();

                if (data.ready) {
                    setTimeout(() => {
                        progressArea.classList.add('hidden');
                        resultArea.classList.remove('hidden');
                        downloadLink.href = `/download/${task_id}/Imagenes.docx`;
                    }, 500);
                }
            } catch (e) {
                statusText.textContent = 'Error: ' + e.message;
            }

            processBtn.disabled = false;
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animationPlayState = 'running';
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-in').forEach(el => {
            el.style.animationPlayState = 'paused';
            observer.observe(el);
        });
    </script>
</body>
</html>
